name: Build and Push Docker Image

on:
  workflow_dispatch:  # Allows you to trigger it manually
  push:
    branches:
      - main  # Auto-builds anytime you edit handler.py or push to main

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Check out the repository
        uses: actions/checkout@v3
        
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
        
      - name: Build and push the Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/swipeshot-worker:latest
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/swipeshot-worker:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/swipeshot-worker:buildcache,mode=max
